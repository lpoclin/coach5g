apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: coach5g
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: coach5g
spec:
  parentRefs:
    - name: coach5g
      namespace: {{ .Values.namespace }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
    - {{ .Values.gateway.ip | quote }}
  rules:
    # WebSocket + API → api-server
    - matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /ws/
      backendRefs:
        - name: coach5g-api
          port: 8080
    # Everything else → frontend (SPA)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: coach5g-frontend
          port: 80
