{{- if .Values.execTerminal.enabled }}
# Dedicated, exec-only ServiceAccount for Addition 4 (exec-per-pod terminal).
# Deliberately separate from the shared `coach5g` ServiceAccount (used by all
# three workloads, serviceaccount.yaml) so the frontend's and capture-agent's
# tokens never carry exec rights. See helm/templates/rbac-exec.yaml,
# docs/RISK_ASSESSMENT_ADDITIONS.md Addition 4, and
# docs/EXEC_IDENTITY_ASSESSMENT.md.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coach5g-exec
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: coach5g
    app.kubernetes.io/component: rbac-exec
---
# Manually-provisioned long-lived token for coach5g-exec (the auto-mounted
# per-pod token always belongs to api-server's own `serviceAccountName:
# coach5g`, per api-server-deployment.yaml -- a pod can only auto-mount one
# ServiceAccount's token). The control plane populates token/ca.crt/namespace
# for this Secret automatically once created; api-server mounts it as a
# second volume so it can act as coach5g-exec only for the exec call,
# without ever holding pods/exec on its primary identity.
apiVersion: v1
kind: Secret
metadata:
  name: coach5g-exec-token
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: coach5g
    app.kubernetes.io/component: rbac-exec
  annotations:
    kubernetes.io/service-account.name: coach5g-exec
type: kubernetes.io/service-account-token
{{- end }}
