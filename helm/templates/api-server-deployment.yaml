apiVersion: apps/v1
kind: Deployment
metadata:
  name: coach5g-api
  namespace: {{ .Values.namespace }}
  labels:
    app: coach5g-api
    app.kubernetes.io/name: coach5g
    app.kubernetes.io/component: api-server
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app: coach5g-api
  template:
    metadata:
      labels:
        app: coach5g-api
        app.kubernetes.io/name: coach5g
    spec:
      {{- /* Build {namespace: {nfLabel: dnn, ...}, ...} from targets[].dnnMap
             for the DNN_MAP_OVERRIDE env var below -- entries only exist for
             namespaces that actually set dnnMap, so this is a no-op ("{}")
             for anyone not using the override. */}}
      {{- $dnnMapByNs := dict }}
      {{- range .Values.targets }}
      {{- if .dnnMap }}
      {{- $_ := set $dnnMapByNs .namespace .dnnMap }}
      {{- end }}
      {{- end }}
      serviceAccountName: coach5g
      {{- if .Values.apiServer.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.apiServer.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: api-server
          image: {{ .Values.apiServer.image }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9999
              protocol: TCP
          env:
            - name: GIN_MODE
              value: release
            - name: LOKI_URL
              value: {{ .Values.loki.url | quote }}
            - name: PROMETHEUS_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: HUBBLE_ADDRESS
              value: {{ .Values.hubble.address | quote }}
            - name: TARGET_NAMESPACES
              value: "{{ range $i, $t := .Values.targets }}{{ if $i }},{{ end }}{{ $t.namespace }}{{ end }}"
            - name: DNN_MAP_OVERRIDE
              value: {{ $dnnMapByNs | toJson | quote }}
            {{- if .Values.terminal.enabled }}
            - name: SSH_HOST
              value: {{ .Values.terminal.sshHost | quote }}
            - name: SSH_PORT
              value: {{ .Values.terminal.sshPort | quote }}
            {{- end }}
            - name: CLUSTER_HYPERVISOR
              value: {{ .Values.clusterInfo.hypervisor | quote }}
            - name: CLUSTER_CNI_PRIMARY
              value: {{ .Values.clusterInfo.cniPrimary | quote }}
            - name: CLUSTER_CNI_SECONDARY
              value: {{ .Values.clusterInfo.cniSecondary | quote }}
            - name: ALLOWED_ORIGINS
              value: "http://{{ .Values.gateway.hostname }},https://{{ .Values.gateway.hostname }}{{ range .Values.allowedOrigins }},{{ . }}{{ end }}"
            {{- if .Values.grpc.tls.enabled }}
            - name: GRPC_TLS_ENABLED
              value: "true"
            - name: GRPC_TLS_CERT_FILE
              value: /etc/coach5g/grpc-tls/tls.crt
            - name: GRPC_TLS_KEY_FILE
              value: /etc/coach5g/grpc-tls/tls.key
            - name: GRPC_TLS_CA_FILE
              value: /etc/coach5g/grpc-tls/ca.crt
            - name: GRPC_TLS_CAPTURE_AGENT_IDENTITY
              value: {{ .Values.grpc.tls.captureAgentIdentity | quote }}
            {{- end }}
            {{- if .Values.execTerminal.enabled }}
            - name: EXEC_TERMINAL_ENABLED
              value: "true"
            - name: EXEC_SA_TOKEN_FILE
              value: /etc/coach5g/exec-token/token
            {{- end }}
          {{- if or .Values.grpc.tls.enabled .Values.execTerminal.enabled }}
          volumeMounts:
            {{- if .Values.grpc.tls.enabled }}
            - name: grpc-tls
              mountPath: /etc/coach5g/grpc-tls
              readOnly: true
            {{- end }}
            {{- if .Values.execTerminal.enabled }}
            - name: exec-sa-token
              mountPath: /etc/coach5g/exec-token
              readOnly: true
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
      {{- if or .Values.grpc.tls.enabled .Values.execTerminal.enabled }}
      volumes:
        {{- if .Values.grpc.tls.enabled }}
        - name: grpc-tls
          secret:
            secretName: {{ .Values.grpc.tls.apiServerSecretName }}
        {{- end }}
        {{- if .Values.execTerminal.enabled }}
        - name: exec-sa-token
          secret:
            secretName: coach5g-exec-token
        {{- end }}
      {{- end }}
