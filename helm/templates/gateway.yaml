apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coach5g
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: coach5g
  annotations:
    # Cilium LoadBalancer IP pool annotation
    cilium.io/ipam-pool: {{ .Values.gateway.ipamPoolName | quote }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.gateway.tls.enabled }}
    # HTTPS listener coexists with the HTTP listener above -- no forced
    # redirect. Add a RequestRedirect filter to httproute.yaml's rules if
    # HTTP -> HTTPS redirect is wanted later; the HTTPRoute already attaches
    # to this listener automatically (its parentRefs omits sectionName, so
    # per the Gateway API spec it attaches to every compatible listener).
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
  addresses:
    - type: IPAddress
      value: {{ .Values.gateway.ip | quote }}
