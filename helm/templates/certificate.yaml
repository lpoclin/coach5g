{{- if and .Values.gateway.tls.enabled .Values.gateway.tls.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tls.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: coach5g
spec:
  secretName: {{ .Values.gateway.tls.secretName }}
  dnsNames:
    - {{ .Values.gateway.hostname | quote }}
  issuerRef:
    name: {{ required "gateway.tls.certManager.issuerName is required when gateway.tls.certManager.enabled is true" .Values.gateway.tls.certManager.issuerName }}
    kind: ClusterIssuer
{{- end }}
