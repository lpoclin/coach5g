apiVersion: v1
kind: Service
metadata:
  name: coach5g-api
  namespace: {{ .Values.namespace }}
  labels:
    app: coach5g-api
    app.kubernetes.io/name: coach5g
spec:
  selector:
    app: coach5g-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9999
      targetPort: 9999
      protocol: TCP
  type: ClusterIP
